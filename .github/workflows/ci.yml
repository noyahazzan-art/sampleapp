name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore src/SampleApp/SampleApp.csproj
      - name: Build
        run: dotnet build src/SampleApp/SampleApp.csproj --configuration Release --no-restore
      - name: Publish
        run: dotnet publish src/SampleApp/SampleApp.csproj -c Release -o publish
